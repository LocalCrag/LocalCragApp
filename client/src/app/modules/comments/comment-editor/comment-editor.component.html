<ng-container *transloco="let t; read: 'comments.editor'">
  <form
    [formGroup]="form"
    lcForm
    (ngSubmit)="send()"
    class="flex gap-2 flex-col"
  >
    <div lcControlGroup class="flex flex-col gap-2">
      <textarea
        pTextarea
        formControlName="message"
        lcFormControl
        [placeholder]="t('writeYourComment')"
        rows="2"
        autoResize="true"
        #commentTextarea
      ></textarea>
      <small class="lc-error" *lcIfError="'maxlength'">{{
        "validation.maxLength" | transloco: { max: 10000 }
      }}</small>
    </div>

    <div class="flex justify-end gap-2">
      @if (cancelable) {
        <p-button
          [disabled]="saving"
          (click)="cancel()"
          [label]="t('cancel')"
          severity="secondary"
          variant="outlined"
        ></p-button>
      }
      <p-button
        [loading]="saving"
        (click)="send()"
        [disabled]="form.invalid"
        [label]="t('postComment')"
      ></p-button>
    </div>
  </form>
</ng-container>
