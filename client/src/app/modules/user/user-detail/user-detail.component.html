<ng-template #pageTitle>
  @if (user) {
    <lc-user-avatar
      [user]="user"
      size="xlarge"
      styleClass="mr-4"
      [preview]="true"
    />
  }
  {{ user?.firstname }} {{ user?.lastname }}
</ng-template>

<div class="content">
  <router-outlet name="userContent"></router-outlet>
</div>
