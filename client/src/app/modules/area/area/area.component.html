<div class="content p-6">
  <div class="flex gap-1">
    @if (area?.closed) {
      <lc-closed-spot-tag
        spotType="area"
        [slug]="area.slug"
        [reasons]="area.closedReasons"
        [closureIsPermanent]="area.closureIsPermanent"
      ></lc-closed-spot-tag>
    }
    @if (area?.secret) {
      <lc-secret-spot-tag></lc-secret-spot-tag>
    }
  </div>

  <router-outlet name="areaContent"></router-outlet>
</div>
