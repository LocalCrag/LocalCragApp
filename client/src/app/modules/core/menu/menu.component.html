<ng-container *transloco="let t; read: 'menu'">
  <lc-header-menu [model]="items" data-cy="main-menu">
    <ng-template #start>
      <a class="main-link" routerLink="/">
        @if (logoImage$ | async) {
          <img
            alt="{{ t('logoImageAlt') }}"
            [src]="(logoImage$ | async).thumbnailM"
            height="40"
            class="mr-2 flex cursor-pointer"
          />
        }
        @if (
          (logoImage$ | async) === null || (logoImage$ | async) === undefined
        ) {
          <strong class="cursor-pointer white-space-nowrap">{{
            instanceName$ | async
          }}</strong>
        }
      </a>
    </ng-template>
    <ng-template #end>
      <p-menu
        #menu
        [model]="userMenuItems"
        [popup]="true"
        data-cy="auth-menu"
        styleClass="wide-menu"
      ></p-menu>
      <div class="flex justify-content-center gap-2">
        <div class="search-fake-input" (click)="openSearch()" tabindex="0">
          <i class="pi pi-search mr-2"></i>
          <span class="search-label">{{ t("searchPlaceholder") }}</span>
        </div>
        <lc-language-select
          *isLoggedOut="true"
          [noLabel]="true"
          [(ngModel)]="language"
          (ngModelChange)="updateLanguage($event)"
          lcFormControl
        ></lc-language-select>

        <ng-container *isLoggedIn="true">
          <lc-notification-bell></lc-notification-bell>
          @if (currentUser$ | async; as authUser) {
            <lc-user-avatar
              [user]="authUser"
              (click)="menu.toggle($event)"
              data-cy="auth-menu-button"
              styleClass="mr-2"
              size="normal"
              shape="circle"
            />
          }
        </ng-container>
        <p-button
          icon="pi pi-user"
          routerLink="login"
          severity="secondary"
          *isLoggedOut="true"
          [text]="true"
          data-cy="navbar-login"
        ></p-button>
      </div>
    </ng-template>
  </lc-header-menu>
</ng-container>
