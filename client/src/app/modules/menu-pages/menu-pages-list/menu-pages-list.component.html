<ng-container *transloco="let t; read: 'menuPages.menuPageList'">
  <div class="content p-6">
    <p-dataView
      #dv
      [value]="menuPages"
      [sortField]="sortField"
      [sortOrder]="sortOrder"
    >
      <ng-template #emptymessage>
        <p-message
          severity="info"
          icon="pi pi-info-circle"
          class="m-12 mb-1 block"
          >{{ t("noMenuPagesFoundEmptyMessage") }}</p-message
        >
      </ng-template>
      <ng-template #header>
        <div class="flex flex-row justify-between">
          <p-select
            [disabled]="loading === loadingStates.LOADING"
            [options]="sortOptions"
            [(ngModel)]="sortKey"
            optionLabel="label"
            (onChange)="onSortChange($event)"
            styleClass="md:mb-0"
          ></p-select>
          <div class="lc-button-group justify-end">
            <p-button
              [disabled]="loading === loadingStates.LOADING"
              label="{{ t('newMenuPageButtonLabel') }}"
              icon="pi pi-plus"
              routerLink="/pages/create-menu-page"
              class="responsive-button"
            ></p-button>
          </div>
        </div>
      </ng-template>
      <ng-template let-menuPages #list>
        @if (loading === loadingStates.LOADING) {
          <lc-menu-list-skeleton></lc-menu-list-skeleton>
        }
        @if (loading !== loadingStates.LOADING) {
          <div class="grid grid-cols-12">
            @for (menuPage of menuPages; track menuPage; let first = $first) {
              <div class="col-span-12">
                <div
                  class="flex flex-col xl:items-start p-6 gap-2"
                  [ngClass]="{ 'border-t border-surface': !first }"
                >
                  <div
                    class="text-2xl font-bold text-surface-900 dark:text-surface-0 flex w-full"
                  >
                    <div class="grow flex items-center">
                      {{ menuPage.title }}
                    </div>
                    <div class="lc-button-group grow-0">
                      <p-button
                        label="{{ t('visitMenuPageButtonLabel') }}"
                        icon="pi pi-eye"
                        routerLink="/pages/{{ menuPage.slug }}"
                        styleClass="pr-0 responsive-button"
                        [text]="true"
                      ></p-button>
                      <p-button
                        label="{{ t('editMenuPageButtonLabel') }}"
                        icon="pi pi-file-edit"
                        routerLink="/pages/{{ menuPage.slug }}/edit"
                        styleClass="pr-0 responsive-button"
                        [text]="true"
                      ></p-button>
                    </div>
                  </div>
                </div>
              </div>
            }
          </div>
        }
      </ng-template>
    </p-dataView>
  </div>
</ng-container>
