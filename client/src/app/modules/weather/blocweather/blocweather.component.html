<ng-container *transloco="let t; read: 'blocWeather'">
  @if (blocWeatherConfig) {
    <iframe
      [src]="safeBlocWeatherUrl"
      width="100%"
      height="420"
      style="
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        margin-top: 1rem;
        margin-bottom: 1rem;
      "
    ></iframe>
    <p-message icon="pi pi-info-circle">
      <div class="block">
        {{ t("blocWeatherInfo") }}<br />
        <small>{{ t("blocWeatherInfoModel") }}</small>
      </div>
    </p-message>
  }
  @if (!blocWeatherConfig) {
    <p-skeleton width="100%" height="420px" borderRadius="8px"></p-skeleton>
  }
</ng-container>
