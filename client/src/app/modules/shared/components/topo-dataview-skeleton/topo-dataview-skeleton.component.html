<div class="grid grid-cols-12">
  @for (_ of [1, 2, 3, 4, 5]; track _; let first = $first) {
    <div class="col-span-12">
      <div
        class="flex flex-col xl:flex-row xl:items-start p-6 gap-6"
        [ngClass]="{ 'border-t border-surface': !first }"
      >
        <p-skeleton styleClass="w-9/12 sm:w-64 xl:w-40 mx-auto h-32" />
        <div class="flex flex-col w-full xl:items-start gap-6">
          <p-skeleton width="15rem" height="2rem" />
          <p-skeleton
            width="100%"
            height="4rem"
          />
          <p-skeleton
            width="100%"
            height="1rem"
          />
          <p-skeleton width="20rem" height="1.5rem" />
          <p-skeleton width="10rem" height="1rem" />
        </div>
      </div>
    </div>
  }
</div>
