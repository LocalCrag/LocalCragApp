<ng-container *transloco="let t; read: 'closedSpotAlert'">
  <div class="flex flex-column gap-2 w-full">
    @for (alert of displayAlerts; track $index) {
      <p-message
        severity="error"
        [text]="alertText(alert)"
        class="w-full"
      ></p-message>
    }
  </div>
</ng-container>
