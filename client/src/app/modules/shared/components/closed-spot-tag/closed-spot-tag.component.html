<ng-container *transloco="let t; read: 'closedSpotTag'">
  <span
    class="closed-spot-tag-trigger"
    tabindex="0"
    role="button"
    [attr.aria-label]="t('showReasons')"
    (click)="onTagClick($event)"
    (keydown.enter)="onTagClick($event)"
  >
    <p-tag severity="danger" class="closed-spot-tag">
      <span class="closed-spot-tag-inner">
        <i class="p-tag-icon pi pi-ban" aria-hidden="true"></i>
        <span>{{ t(isPermanentClosure ? "closed" : "temporarilyClosed") }}</span>
        <i class="p-tag-icon pi pi-question-circle" aria-hidden="true"></i>
      </span>
    </p-tag>
  </span>

  <p-popover
    #popover
    appendTo="body"
    styleClass="closed-spot-tag-popover"
    (onShow)="onPopoverShow()"
  >
    <div class="closed-spot-tag-popover-content">
      @if (loading) {
        <p-progressSpinner
          strokeWidth="4"
          styleClass="closed-spot-tag-spinner"
        />
      } @else if (loadError) {
        <span class="closed-spot-tag-error">{{ t("loadError") }}</span>
      } @else if (displayReasons !== null) {
        <lc-closed-spot-alert [reasons]="displayReasons"></lc-closed-spot-alert>
      }
    </div>
  </p-popover>
</ng-container>
