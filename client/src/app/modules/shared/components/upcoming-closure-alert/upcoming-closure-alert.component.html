<ng-container *transloco="let t; read: 'closedSpotAlert'">
  <div class="flex flex-column gap-2 w-full">
    @for (
      warning of warnings;
      track warning.startsOn + (warning.reason ?? "")
    ) {
      <p-message
        severity="warn"
        [text]="warningText(warning)"
        class="w-full"
      ></p-message>
    }
  </div>
</ng-container>
