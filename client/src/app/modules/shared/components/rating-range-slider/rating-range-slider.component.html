<div class="slider-container">
  <lc-slider-labels
    [rangeMin]="range[0]"
    [rangeMax]="range[1]"
    [min]="min"
    [max]="max"
    [minLabel]="'' + range[0]"
    [maxLabel]="'' + range[1]"
  />
  <p-slider
    [ngModel]="range"
    (ngModelChange)="onRangeChange($event)"
    [min]="min"
    [max]="max"
    [disabled]="disabled"
    [range]="true"
    [step]="1"
    (onSlideEnd)="slideEnd.emit()"
  />
</div>
