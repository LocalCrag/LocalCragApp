@if (topoImage.title || (topoImage.coordinates && topoImage.coordinates)) {
  <div class="flex justify-center items-center mt-2">
    <div class="grow flex block-title">
      @if (topoImage.title) {
        <h5 class="mt-0 mb-0 inline-block">
          {{ topoImage.title }}
        </h5>
      }
    </div>
    @if (topoImage.coordinates) {
      <lc-coordinates-button
        [coordinates]="topoImage.coordinates"
      ></lc-coordinates-button>
    }
  </div>
}

@if (topoImage.description) {
  <section class="text-xs flex justify-start">
    <div [innerHTML]="topoImage.description | sanitizeHtml"></div>
  </section>
}
