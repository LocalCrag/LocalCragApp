<div class="content">
  <div class="flex gap-1">
    @if (crag?.closed) {
      <lc-closed-spot-tag
        spotType="crag"
        [slug]="crag.slug"
        [reasons]="crag.closedReasons"
        [closureIsPermanent]="crag.closureIsPermanent"
      ></lc-closed-spot-tag>
    }
    @if (crag?.secret) {
      <lc-secret-spot-tag></lc-secret-spot-tag>
    }
  </div>

  <router-outlet name="cragContent"></router-outlet>
</div>
