<ng-container *transloco="let t; read: 'ascentCount'">
  <p-chip
    [label]="
      ascentCount === 1
        ? ascentCount + ' ' + t('ascent')
        : ascentCount + ' ' + t('ascents')
    "
    icon="pi pi-check"
    [class.clickable]="!!routerLink"
    (click)="onClick($event)"
  ></p-chip>
</ng-container>
