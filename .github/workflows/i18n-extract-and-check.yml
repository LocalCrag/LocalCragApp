name: i18n extract & check

on:
  pull_request:
    branches:
      - main
      - next

permissions:
  contents: read

jobs:
  i18n-extract-and-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v5

      - name: Use node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Extract translations
        run: npm run i18n:extract

      - name: Fail if there are empty translation strings
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking for empty translation strings in client/src/assets/i18n ..."

          python - <<'PY'
          import json
          import pathlib
          import sys

          base = pathlib.Path('src/assets/i18n')
          if not base.exists():
            print(f"Directory not found: {base}", file=sys.stderr)
            sys.exit(2)

          def walk(node, path):
            if isinstance(node, dict):
              for k, v in node.items():
                walk(v, f"{path}.{k}" if path else str(k))
            elif isinstance(node, list):
              for i, v in enumerate(node):
                walk(v, f"{path}[{i}]")
            elif isinstance(node, str):
              if node == "":
                empties.append(path)

          bad = []
          for file in sorted(base.glob('*.json')):
            try:
              data = json.loads(file.read_text(encoding='utf-8'))
            except Exception as e:
              print(f"Failed to parse {file}: {e}", file=sys.stderr)
              sys.exit(2)

            empties = []
            walk(data, "")
            if empties:
              bad.append((file, empties))

          if bad:
            print("Empty translation strings detected (these will render as missing/blank UI text):")
            for file, paths in bad:
              for p in paths:
                print(f"- {file}:{p}")
            print("\nPlease provide a translation for every extracted key (or remove unused keys).")
            sys.exit(1)

          print("No empty translation strings found.")
          PY
